<!DOCTYPE html>
<html>

<head>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#313131;
  color:rgb(62, 62, 62);
  text-align:center;
}

#arena{
  position:absolute;
  width:100%;
  height:100%;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
}

.enemy{
  position:absolute;
  width:100px;
  height:100px;
  border-radius:8px;
  cursor:pointer;
}* {
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

img {
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}

</style>

</head>

</html>
